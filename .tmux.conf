# Install tpm and plugins if not already installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
   ~/.tmux/plugins/tpm/tpm && \
   ~/.tmux/plugins/tpm/bin/install_plugins'"

# Set preferences
set -g prefix C-b
set -g escape-time 1
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g allow-passthrough on
set -g visual-activity off
set -g repeat-time 30000
set-option -g focus-events on
set -g default-terminal "tmux-256color"
bind-key r source-file ~/.tmux.conf
bind-key m set -g mouse\; refresh-client
bind-key -r c-l next-window
bind-key -r c-h previous-window
bind-key e select-pane -P "bg=colour234 fg=colour33"\; select-pane -d
bind-key E select-pane -P "bg= fg="\; select-pane -e
bind-key W split-window -h "bash ~/.tmux-clients.sh --only_n false; read -n 1 -s" \; resize-pane -Z

# Set new panes to open in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Open popup
bind-key b switch-client -T b_mode
bind-key -T b_mode h display-popup -w 90% -h 90% -E htop
bind-key -T b_mode l display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit

# Hide and unhide status bar
bind-key t set -g status off\; unbind-key C-b\; set -g prefix C-y
bind-key T set -g status on\; unbind-key C-y\; set -g prefix C-b\; bind-key C-b send-prefix

# Toggle right status (CPU/RAM stats)
bind-key -T b_mode o if-shell '[ "$(tmux show-option -gv status-right-length)" -gt 3 ]' \
  'set -g status-right-length 3' \
  'set -g status-right-length 100'

# Toggle right status (CPU/RAM stats)
bind-key -T b_mode w if-shell '[ "$(tmux show-option -gv status-left-length)" -gt 3 ]' \
  'set -g status-left-length 3' \
  'set -g status-left-length 100'

# Copy to host
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "bash -c 'exec ~/.tmux-copy-to-clipboard.sh'"
bind-key -T copy-mode-emacs M-w send-keys -X copy-pipe-and-cancel "bash -c 'exec ~/.tmux-copy-to-clipboard.sh'"
# For tmux default copy mode (press Enter to copy)
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "bash -c 'exec ~/.tmux-copy-to-clipboard.sh'"
bind-key -T copy-mode-emacs Enter send-keys -X copy-pipe-and-cancel "bash -c 'exec ~/.tmux-copy-to-clipboard.sh'"

# Display panel numbers until selection
bind-key -T prefix q display-panes -d 0

# Act like vim
setw -g mode-keys vi
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-processes 'ssh nvtop btop nvim'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux

set -g status-position top

# Status bar background (overrides Dracula)
set -g @status-bg-color "#454758"
set -g status-style 'bg=#{@status-bg-color}'

# Left indicator - rounded pill, turns yellow on prefix activation
set -g status-left \
"#{?client_prefix,#[fg=#f1fa8c],#[fg=#50fa7b]}#[bg=terminal]\uE0B6\
#{?client_prefix,#[bg=#f1fa8c],#[bg=#50fa7b]}#[fg=#282a36]\
#(~/.tmux-platform-icon.sh)#(~/.tmux-mouse-monitor.sh) #(bash ~/.tmux-clients.sh)\
#{?client_prefix,#[fg=#f1fa8c],#[fg=#50fa7b]}#[bg=#{@status-bg-color}]\uE0B4#[bg=#{@status-bg-color}] "

# Window tab separator
set -g window-status-separator "#[bg=#{@status-bg-color}]"

# Active window tab - rounded purple pill
set -g window-status-current-format \
"#[fg=#6272a4,bg=#{@status-bg-color}]\uE0B6\
#[fg=#f8f8f2,bg=#6272a4] #I #W#{?window_flags,#[fg=#bd93f9]#{window_flags},} \
#[fg=#6272a4,bg=#{@status-bg-color}]\uE0B4"

# Inactive window tab
set -g window-status-format \
"#[fg=white]#[bg=#{@status-bg-color}] #I #W#{?window_flags,#[fg=#6272a4]#{window_flags},} "

# Right indicator - rounded CPU/RAM pill
set -g status-right \
" #[bg=#{@status-bg-color}]#[fg=#ffb86c,bg=#{@status-bg-color}]\uE0B6\
#[fg=#282a36,bg=#ffb86c]#(bash ~/.tmux-cpu-info.sh)\
#[fg=#282a36,bg=#ffb86c]#(bash ~/.tmux-ram-info.sh)\
#[fg=#ffb86c,bg=terminal]\uE0B4"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
